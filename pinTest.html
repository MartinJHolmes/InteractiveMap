<!DOCTYPE html>
<html>

<head>
    <!-- <script src="include/components.js"></script> -->
</head>

<body>
    <style>
        .pin {

            position: relative;
            width: fit-content;
            height: 15px;
            background: red;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 0px;
            padding-top: 3px;
            padding-right: 0px;
            padding-bottom: 3px;
        }

        /* Adjusted pointer */
        .pin::after {

            content: "";
            position: absolute;
            bottom: -7px;
            /* raise it closer */
            left: 14px;
            transform: translateX(-50%) rotate(45deg);
            width: 14px;
            /* slightly smaller */
            height: 14px;
            background: red;

        }

        /* White inner circle */
        .inner {


            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: black;
            border: 4px solid red;
            z-index: 1;
            overflow: hidden;

        }

        .label-text {
            color: white;
            font-size: 14px;
        }
    </style>
    <category-icon label="Mercado de Colon" category="i" color="red"
        style="position: absolute; left: 680.979px; top: 340.928px;">
        <div class="pin">
            <div class="inner">i</div>
            <div class="label-text">&nbsp;Mercado de Colon&nbsp;&nbsp;</div>
        </div>
    </category-icon>
</body>

</html>
